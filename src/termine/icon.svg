<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15151a"/>
      <stop offset="1" stop-color="#08080c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#8C6BBF" stop-opacity="0.22"/>
      <stop offset="0.65" stop-color="#8C6BBF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#glow)"/>

  <!-- Calendar binding rings -->
  <rect x="320" y="170" width="32" height="80" rx="16" fill="#c8c4c0" opacity="0.6"/>
  <rect x="672" y="170" width="32" height="80" rx="16" fill="#c8c4c0" opacity="0.6"/>

  <!-- Calendar body outline -->
  <rect x="180" y="220" width="664" height="660" rx="36" fill="none" stroke="#c8c4c0" stroke-width="6" opacity="0.45"/>

  <!-- Header strip -->
  <rect x="180" y="220" width="664" height="100" rx="36" fill="#8C6BBF" opacity="0.85"/>
  <rect x="180" y="288" width="664" height="32" fill="#8C6BBF" opacity="0.85"/>

  <!-- Day grid (5 cols x 4 rows) -->
  <g fill="#c8c4c0">
    <!-- row 1 -->
    <circle cx="260" cy="400" r="22" opacity="0.55"/>
    <circle cx="375" cy="400" r="22" opacity="0.55"/>
    <circle cx="490" cy="400" r="22" opacity="0.55"/>
    <circle cx="605" cy="400" r="22" opacity="0.55"/>
    <circle cx="720" cy="400" r="22" opacity="0.55"/>
    <!-- row 2 -->
    <circle cx="260" cy="500" r="22" opacity="0.55"/>
    <circle cx="375" cy="500" r="22" opacity="0.55"/>
    <circle cx="605" cy="500" r="22" opacity="0.55"/>
    <circle cx="720" cy="500" r="22" opacity="0.55"/>
    <!-- row 3 -->
    <circle cx="260" cy="600" r="22" opacity="0.55"/>
    <circle cx="375" cy="600" r="22" opacity="0.55"/>
    <circle cx="490" cy="600" r="22" opacity="0.55"/>
    <circle cx="605" cy="600" r="22" opacity="0.55"/>
    <circle cx="720" cy="600" r="22" opacity="0.55"/>
    <!-- row 4 -->
    <circle cx="260" cy="700" r="22" opacity="0.55"/>
    <circle cx="375" cy="700" r="22" opacity="0.55"/>
    <circle cx="490" cy="700" r="22" opacity="0.55"/>
    <circle cx="605" cy="700" r="22" opacity="0.55"/>
    <circle cx="720" cy="700" r="22" opacity="0.55"/>
  </g>

  <!-- Today marker (highlighted) -->
  <circle cx="490" cy="500" r="34" fill="#8C6BBF"/>
  <circle cx="490" cy="500" r="22" fill="#ffffff" opacity="0.95"/>
</svg>
