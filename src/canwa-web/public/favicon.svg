<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b6bcf"/>
      <stop offset="1" stop-color="#5b3fa3"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="1" stop-color="#f08a5d"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- White photo frame -->
  <rect x="84" y="116" width="344" height="280" rx="18" fill="#ffffff"/>

  <!-- Sky/gradient inside frame -->
  <rect x="104" y="136" width="304" height="240" rx="8" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="350" cy="200" r="34" fill="#ffffff" fill-opacity="0.92"/>

  <!-- Back mountain -->
  <path d="M104 320 L200 220 L268 288 L316 246 L408 338 L408 376 L104 376 Z"
        fill="#5b3fa3" fill-opacity="0.55"/>
  <!-- Front mountain -->
  <path d="M104 376 L160 296 L236 360 L300 302 L360 360 L408 320 L408 376 Z"
        fill="#2f1f5c"/>

  <!-- Subtle corner accent (paint drop) -->
  <circle cx="120" cy="152" r="10" fill="#ffffff" fill-opacity="0.75"/>
</svg>
