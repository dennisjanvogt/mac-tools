<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15151a"/>
      <stop offset="1" stop-color="#08080c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#8C6BBF" stop-opacity="0.22"/>
      <stop offset="0.65" stop-color="#8C6BBF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sparkFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8C6BBF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8C6BBF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sparkStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a386d8"/>
      <stop offset="1" stop-color="#7351A8"/>
    </linearGradient>
  </defs>

  <!-- Shared ConsultingOS background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#glow)"/>

  <!-- Metric readout (top row — two "KPI" pills) -->
  <g>
    <rect x="160" y="180" width="200" height="14" rx="7" fill="#c8c4c0" opacity="0.55"/>
    <rect x="160" y="210" width="128" height="50" rx="8" fill="#c8c4c0" opacity="0.85"/>
    <rect x="664" y="180" width="200" height="14" rx="7" fill="#c8c4c0" opacity="0.55"/>
    <rect x="664" y="210" width="168" height="50" rx="8" fill="#8C6BBF" opacity="0.9"/>
  </g>

  <!-- Subtle horizontal grid lines for the chart area -->
  <g stroke="#c8c4c0" stroke-width="3" opacity="0.12">
    <line x1="160" y1="420" x2="864" y2="420"/>
    <line x1="160" y1="540" x2="864" y2="540"/>
    <line x1="160" y1="660" x2="864" y2="660"/>
    <line x1="160" y1="780" x2="864" y2="780"/>
  </g>

  <!-- Sparkline gradient fill -->
  <path d="M 160 620 L 245 680 L 330 530 L 415 600 L 500 430 L 585 500 L 670 350 L 755 440 L 864 310 L 864 780 L 160 780 Z"
        fill="url(#sparkFill)"/>

  <!-- Sparkline stroke -->
  <path d="M 160 620 L 245 680 L 330 530 L 415 600 L 500 430 L 585 500 L 670 350 L 755 440 L 864 310"
        fill="none" stroke="url(#sparkStroke)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Final datapoint dot (accent highlight) -->
  <circle cx="864" cy="310" r="20" fill="#a386d8"/>
  <circle cx="864" cy="310" r="10" fill="#ffffff" opacity="0.95"/>

  <!-- Bottom metric bars — 4 small indicators -->
  <g fill="#c8c4c0">
    <rect x="160" y="832" width="148" height="10" rx="5" opacity="0.55"/>
    <rect x="338" y="832" width="148" height="10" rx="5" opacity="0.75"/>
    <rect x="516" y="832" width="148" height="10" rx="5" opacity="0.45"/>
    <rect x="694" y="832" width="170" height="10" rx="5" opacity="0.65"/>
  </g>
</svg>
